services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: lifestack_e2e
      POSTGRES_PASSWORD: lifestack_e2e
      POSTGRES_DB: lifestack_e2e
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifestack_e2e -d lifestack_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-e2e:
    build:
      context: ../lifestack-api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENV=local
      - BACKEND_CORS_ORIGINS=["http://localhost:5174"]
      - DATABASE_URL=postgresql+asyncpg://lifestack_e2e:lifestack_e2e@postgres:5432/lifestack_e2e
      - REDIS_URL=redis://redis:6379/1
      - RATE_LIMIT_STORAGE_URI=redis://redis:6379/1
      - RATE_LIMIT_ENABLED=false
      - SCHEDULER_ENABLED=false
      - ACCESS_TOKEN_EXPIRE_SECONDS=3600
      - REFRESH_TOKEN_EXPIRE_SECONDS=604800
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  web-e2e:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../lifestack-web:/app
    ports:
      - "5174:5173"
    depends_on:
      api-e2e:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8001/v1
    command: sh -c "npm install && npm run dev -- --host --port 5173 --mode e2e"
