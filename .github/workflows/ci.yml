name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm run security:audit

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          extra_args: --results=verified

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout E2E repository
        uses: actions/checkout@v4
        with:
          path: lifestack-e2e

      - name: Checkout API repository
        uses: actions/checkout@v4
        with:
          repository: sajankp/lifestack-api
          path: lifestack-api

      - name: Checkout Web repository
        uses: actions/checkout@v4
        with:
          repository: sajankp/lifestack-web
          path: lifestack-web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lifestack-e2e/package-lock.json

      - name: Install E2E dependencies
        run: |
          cd lifestack-e2e
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd lifestack-e2e
          npx playwright install --with-deps chromium

      - name: Start Docker Compose Stack
        run: |
          cd lifestack-e2e
          docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API and Web services to be healthy
        run: |
          # Wait up to 90 seconds
          for i in {1..18}; do
            if curl -f http://localhost:8001/health && curl -f http://localhost:5174; then
              echo "Services are up and healthy!"
              exit 0
            fi
            echo "Waiting for services..."
            sleep 5
          done
          echo "Health checks failed"
          docker compose -f lifestack-e2e/docker-compose.e2e.yml logs
          exit 1

      - name: Run E2E tests
        run: |
          cd lifestack-e2e
          npm run test:full

      - name: Stop Docker Compose Stack
        if: always()
        run: |
          cd lifestack-e2e
          docker compose -f docker-compose.e2e.yml down -v

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: lifestack-e2e/playwright-report/
          retention-days: 30

