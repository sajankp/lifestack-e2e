name: CI Pipeline

# e2e-tests job (Task 4 — gate the e2e suite in CI):
#   - pull_request: runs only the @smoke-tagged subset (fast signal on every PR)
#   - push to main / nightly cron / manual dispatch: runs the full suite
#   - retries=1 is set globally in playwright.config.ts; a test that still
#     fails after that retry is a real regression, not noise — file a GitHub
#     issue and mark the spec with a TODO rather than adding more retries.
#   - Playwright HTML report + traces are uploaded as artifacts on failure.
#
# Cross-repo trigger: lifestack-api and lifestack-web do NOT yet dispatch into
# this workflow on their own pushes to main — wiring a repository_dispatch
# from those repos requires a personal-access-token secret this workflow
# doesn't have visibility into, so that's left as a documented gap (see
# README.md "CI" section) rather than a guessed, silently-broken hookup.
# Interim: workflow_dispatch below covers on-demand runs after an api/web
# merge; nightly cron is the backstop that catches drift within 24h either way.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *' # nightly full run, 03:00 UTC
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - smoke
          - full

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm run security:audit

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          extra_args: --results=verified

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout E2E repository
        uses: actions/checkout@v4
        with:
          path: lifestack-e2e

      - name: Checkout API repository
        uses: actions/checkout@v4
        with:
          repository: sajankp/lifestack-api
          path: lifestack-api

      - name: Checkout Web repository
        uses: actions/checkout@v4
        with:
          repository: sajankp/lifestack-web
          path: lifestack-web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lifestack-e2e/package-lock.json

      - name: Install E2E dependencies
        run: |
          cd lifestack-e2e
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd lifestack-e2e
          npx playwright install --with-deps chromium

      - name: Start Docker Compose Stack
        run: |
          cd lifestack-e2e
          docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API and Web services to be healthy
        run: |
          # Wait up to 90 seconds
          for i in {1..18}; do
            if curl -f http://localhost:8001/health && curl -f http://localhost:5174; then
              echo "Services are up and healthy!"
              exit 0
            fi
            echo "Waiting for services..."
            sleep 5
          done
          echo "Health checks failed"
          docker compose -f lifestack-e2e/docker-compose.e2e.yml logs
          exit 1

      - name: Determine suite
        id: suite
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "npm_script=test:local:smoke" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.suite }}" = "smoke" ]; then
            echo "npm_script=test:local:smoke" >> "$GITHUB_OUTPUT"
          else
            echo "npm_script=test:local" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests
        run: |
          cd lifestack-e2e
          npm run ${{ steps.suite.outputs.npm_script }}

      - name: Stop Docker Compose Stack
        if: always()
        run: |
          cd lifestack-e2e
          docker compose -f docker-compose.e2e.yml down -v

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            lifestack-e2e/playwright-report/
            lifestack-e2e/test-results/
          retention-days: 30
